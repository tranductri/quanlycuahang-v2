<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Chita Foods — Kiểm Kê Ca</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c1614">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ink:#1c1614; --ink-2:#3d322c; --muted:#8a7d75;
      --paper:#fbf7f2; --paper-2:#f3ece3;
      --line:#e6ddd1; --line-2:#d8cbb9; --card:#ffffff;
      --accent:#c1502e; --accent-soft:#f8e6dd; --accent-ink:#7a2e15;
      --ok:#2d6a4f; --ok-soft:#d8efe1;
      --warn:#b06000; --warn-soft:#fff3cd;
      --err:#c5221f; --err-soft:#fce8e6;
      --shadow-md:0 4px 12px rgba(28,22,20,.08),0 2px 4px rgba(28,22,20,.04);
      --r:14px; --r-lg:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--paper);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
    #root{height:100%;display:flex;flex-direction:column;overflow:hidden}
    button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
    input,select,textarea{font:inherit;color:inherit}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .field-input{width:100%;height:56px;padding:0 16px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--card);font-size:17px;color:var(--ink);-webkit-appearance:none;appearance:none;transition:border-color .15s,box-shadow .15s}
    .field-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
    .stepper{display:grid;height:64px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--card);overflow:hidden}
    .stepper button{display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:500;color:var(--ink-2);background:var(--paper-2);transition:background .12s}
    .stepper button:active{background:var(--line)}
    .stepper button:disabled{color:var(--line-2);background:var(--paper)}
    .stepper input{width:100%;height:100%;border:0;background:var(--card);text-align:center;font-size:22px;font-weight:700;color:var(--ink);outline:none}
    .stepper input:focus{background:#fffaf3}
    .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);font-size:12px;font-weight:600}
    .chip-ok{background:var(--ok-soft);color:var(--ok)}
    .chip-err{background:var(--err-soft);color:var(--err)}
    .chip-accent{background:var(--accent-soft);color:var(--accent-ink)}
    .m-card{background:var(--card);border-radius:var(--r-lg);border:1px solid var(--line);padding:16px}
    .btn-primary{width:100%;height:60px;border-radius:var(--r);background:var(--ink);color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;border:0;transition:transform .1s}
    .btn-primary:active{transform:scale(.98)}
    .btn-primary:disabled{background:var(--line-2);opacity:.7;cursor:not-allowed}
    .btn-primary.is-ok{background:var(--ok)}
    .btn-ghost{width:100%;height:56px;border-radius:var(--r);background:var(--paper-2);color:var(--ink);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;border:0}
    .btn-ghost:active{background:var(--line)}
    .btn-ghost:disabled{opacity:.45;cursor:not-allowed}
    .progress{height:6px;width:100%;background:var(--paper-2);border-radius:999px;overflow:hidden}
    .progress>div{height:100%;background:var(--accent);border-radius:999px;transition:width .25s}
    .app-bar{flex-shrink:0;background:rgba(251,247,242,.92);backdrop-filter:saturate(150%) blur(10px);-webkit-backdrop-filter:saturate(150%) blur(10px);border-bottom:1px solid var(--line);padding:14px 16px 12px}
    .app-bar h1{font-size:18px;font-weight:700;letter-spacing:-.2px}
    .bottom-bar{flex-shrink:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line)}
    .h-section{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
    .t-money,.t-num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
    .screen{display:flex;flex-direction:column;height:100%;overflow:hidden}
    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:15px;font-weight:600;z-index:200;white-space:nowrap;box-shadow:var(--shadow-md);animation:toastIn .2s ease-out}
    .toast.ok{background:var(--ok)}.toast.err{background:var(--err)}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GAS_URL = 'https://quanlycuahang-v2.tdtri281090.workers.dev';
const APP_VERSION = 'v68';

const BANH_BAO_IMG = '/quanlycuahang/banh_bao.png';
function productEmoji(ten) {
  if (ten.startsWith('Bánh bao')) return BANH_BAO_IMG;
  if (ten.startsWith('Bánh mì'))  return '🥖';
  if (ten.startsWith('Mì ý'))     return '🍝';
  if (ten.startsWith('Cơm nắm')) return '🍙';
  if (ten === 'Yaourt')            return '🥛';
  return '🍱';
}
function renderIcon(icon, size) {
  if (icon.startsWith('/')) return <img src={icon} style={{width:size,height:size,objectFit:'contain',display:'block'}}/>;
  return <span style={{fontSize:size,lineHeight:1}}>{icon}</span>;
}
function productShort(ten) {
  return ten.replace('Bánh bao ','BB ').replace('Cơm nắm xúc xích ','Cơm nắm ');
}

const DENOMS = [500000,200000,100000,50000,20000,10000,5000,2000,1000];

const computePredicted = v =>
  (v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0)+(v.nhap||0)-(v.xuat||0)-(v.hu||0)-(v.km||0)-(v.chuyen||0);

const computeTieuThu = v => {
  if (v.cuoi_thuc === undefined || v.cuoi_thuc === '') return null;
  return Math.max(0, (v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0)+(v.nhap||0)-(v.hu||0)-(v.km||0)-(v.chuyen||0)-Number(v.cuoi_thuc));
};

const productRev = (v, gia) => {
  const tt = computeTieuThu(v);
  return (tt !== null ? tt : (v.xuat||0)) * gia;
};

const fmt = n => Math.round(n).toLocaleString('vi-VN')+'đ';

const denomLabel = d => d>=1000000?(d/1000000)+'tr':d>=1000?(d/1000)+'k':String(d);

const denomBg = d => ({
  500000:'#3b6ba5',200000:'#a64f1f',100000:'#3a8e3f',50000:'#9c4a8a',
  20000:'#3b7c8e',10000:'#a5704a',5000:'#2e6b95',2000:'#a06b3a',1000:'#7a6a55'
})[d]||'#666';

const INIT = () => {
  let user = {};
  try { user = JSON.parse(localStorage.getItem(USER_KEY)||'{}'); } catch {}
  return {
    ngay: new Date().toISOString().slice(0,10),
    vi_tri: user.vi_tri||'', ten: '',
    dau_ca_done: false,
    products: Array(20).fill(null).map(()=>({})),
    tien_dau:{}, tien_cuoi:{}, cat_dt:{},
    chi_phi_items:[],
    dt_nh:0, ghi_chu:''
  };
};

const STORAGE_KEY = 'ca_v2';
const USER_KEY    = 'ca_user';
const AUTH_KEY      = 'ca_auth';
const SESSION_MS    = 4 * 60 * 60 * 1000; // 4 tiếng

const GIS_CLIENT_ID = '570458211298-ogrk61hf89ou38l8q6lt9pba0qi2p969.apps.googleusercontent.com';


/* ─── LOGIN ─── */
function Login({ onSuccess }) {
  useEffect(() => {
    const init = () => {
      google.accounts.id.initialize({ client_id: GIS_CLIENT_ID, callback: onSuccess });
      google.accounts.id.renderButton(
        document.getElementById('g-signin-btn'),
        { theme: 'outline', size: 'large', text: 'signin_with', locale: 'vi', width: 280 }
      );
      google.accounts.id.prompt();
    };
    if (window.google) { init(); return; }
    const t = setInterval(() => { if (window.google) { clearInterval(t); init(); } }, 100);
    return () => clearInterval(t);
  }, []);

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:32,padding:32,background:'var(--paper)'}}>
      <div style={{textAlign:'center'}}>
        <img src="/quanlycuahang/chita-logo.jpg" alt="Chita Foods"
          style={{width:200,borderRadius:20,marginBottom:16,boxShadow:'0 4px 16px rgba(0,0,0,.10)'}}/>
        <p style={{color:'var(--muted)',fontSize:14}}>Đăng nhập bằng tài khoản Google của cửa hàng</p>
      </div>
      <div id="g-signin-btn" />
    </div>
  );
}

function fetchAllProducts() {
  return fetch(GAS_URL + '?action=getProducts')
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (!res.success || !res.products) return null;
      return res.products.map(function(p){
        return {ten:p.ten, gia:p.gia, short:productShort(p.ten), emoji:productEmoji(p.ten), binh_tan:p.binh_tan, quan_6:p.quan_6};
      });
    });
}

function fetchLastShift(vi_tri) {
  return fetch(GAS_URL + '?action=lastShift&vi_tri=' + encodeURIComponent(vi_tri))
    .then(function(r){ return r.json(); });
}

const saveUser = vi_tri => {
  try { localStorage.setItem(USER_KEY, JSON.stringify({vi_tri})); } catch {}
};


/* ─── ĐẦU CA ─── */
const DAU_ZONES = [
  {k:'dau_kho',icon:'📦', label:'Kho'},
  {k:'dau_h1', icon:'🔥', label:'Tủ 1'},
  {k:'dau_h2', icon:'🌡️', label:'Tủ 2'},
  {k:'dau_cu', icon:'🧁', label:'Hộp'},
];
const noNeg = e => { if(e.key==='-'||e.key==='e'||e.key==='E') e.preventDefault(); };

function DauCa({data, setData, onBack, onDone, prevData, prevLoading, products}) {
  const upd = (idx,k,val) => {
    const ps=[...data.products]; ps[idx]={...(ps[idx]||{}),[k]:val}; setData({...data,products:ps});
  };
  const filled = products.filter(p=>{const v=data.products[p.idx]||{}; return (v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0)>0;}).length;

  const lechCount = prevData ? products.filter(p=>{
    const v=data.products[p.idx]||{};
    const pt=prevData[p.locIdx]?.cuoi_thuc; if(pt===undefined||pt===null) return false;
    const total=(v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0);
    return total!==Number(pt);
  }).length : 0;
  return (
    <div className="screen">
      <div className="app-bar">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:40,height:40,borderRadius:12,background:'var(--paper-2)',fontSize:22}}>‹</button>
          <div style={{flex:1}}>
            <div className="h-section">Đầu ca</div>
            <h1 style={{fontSize:18,marginTop:2}}>Kiểm hàng đầu ca</h1>
          </div>
          <div className="chip chip-accent">{filled}/{products.length}</div>
        </div>
        <div className="progress" style={{marginTop:12}}>
          <div style={{width:`${products.length?(filled/products.length)*100:0}%`}}/>
        </div>
      </div>
      {prevLoading&&(
        <div style={{flexShrink:0,background:'var(--warn-soft)',borderBottom:'1px solid var(--line)',padding:'8px 16px',display:'flex',alignItems:'center',gap:8}}>
          <span style={{display:'inline-block',width:14,height:14,borderRadius:'50%',border:'2px solid var(--warn)',borderTopColor:'transparent',animation:'spin .8s linear infinite',flexShrink:0}}/>
          <span style={{fontSize:13,color:'var(--warn)',fontWeight:600}}>Đang tải dữ liệu ca trước…</span>
        </div>
      )}
      <div className="scroll-area" style={{padding:'10px 12px 24px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {products.map(p=>{
            const v=data.products[p.idx]||{};
            const total=(v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0);
            const pt=prevData?.[p.locIdx]?.cuoi_thuc;
            const hasPrev=pt!==undefined&&pt!==null&&pt!=='';
            const lech=hasPrev?total-Number(pt):null;
            const isLech=lech!==null&&lech!==0;
            return (
              <div key={p.idx} className="m-card" style={{padding:'10px 10px 8px',
                background:isLech?'#fffbeb':'var(--card)',
                border:isLech?'2px solid var(--warn)':total>0?'2px solid var(--ok)':'1px solid var(--line)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  {renderIcon(p.emoji,22)}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,lineHeight:1.15}}>{p.short}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{fmt(p.gia)}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                    <div style={{fontSize:11,fontWeight:600,padding:'4px 8px',borderRadius:8,
                      color:total>0?'var(--ok)':'var(--muted)',
                      background:total>0?'var(--ok-soft)':'var(--paper-2)'}}>
                      ∑ <span className="t-num" style={{fontSize:13,fontWeight:800}}>{total||'—'}</span>
                    </div>
                    {lech!==null&&<span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:6,
                      background:lech===0?'var(--ok-soft)':'var(--warn-soft)',
                      color:lech===0?'var(--ok)':'var(--warn)'}}>
                      {lech===0?'✓ khớp':(lech>0?`+${lech} thừa`:`${lech} thiếu`)}
                    </span>}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                  {DAU_ZONES.map(z=>{
                    const cnt=v[z.k]||0; const has=cnt>0;
                    return (
                      <div key={z.k} onClick={e=>e.currentTarget.querySelector('input').focus()} style={{
                        height:78,borderRadius:12,boxSizing:'border-box',
                        background:has?'var(--ok-soft)':'#fff',
                        border:'1.5px solid '+(has?'var(--ok)':'var(--line)'),
                        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                        padding:'4px 6px',cursor:'text'
                      }}>
                        <div style={{fontSize:15,lineHeight:1,marginBottom:1}}>{z.icon}</div>
                        <input type="number" inputMode="numeric" min="0"
                          value={cnt===0?'':cnt} placeholder="0"
                          onChange={e=>upd(p.idx,z.k,Math.max(0,parseInt(e.target.value||'0',10)||0))}
                          onFocus={e=>e.target.select()} onKeyDown={noNeg}
                          style={{width:'100%',textAlign:'center',fontSize:18,fontWeight:800,
                            border:0,background:'transparent',color:has?'var(--ok)':'var(--ink)',
                            lineHeight:1,padding:0,outline:'none',cursor:'text'}}/>
                        <div style={{fontSize:9,fontWeight:700,marginTop:2,textTransform:'uppercase',letterSpacing:.5,color:has?'var(--ok)':'var(--muted)'}}>{z.label}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="bottom-bar">
        {lechCount>0&&filled>0&&(
          <div style={{marginBottom:8,padding:'8px 12px',borderRadius:8,background:'var(--warn-soft,#fff3cd)',color:'var(--warn)',fontWeight:700,fontSize:13}}>
            ⚠ {lechCount} sản phẩm lệch so với ca trước
          </div>
        )}
        <button className={`btn-primary ${filled===products.length&&lechCount===0?'is-ok':''}`} onClick={onDone}>
          {filled===products.length?'✓ Kiểm hàng xong':`Lưu (${filled}/${products.length} sản phẩm)`}
        </button>
      </div>
    </div>
  );
}

/* ─── TRONG CA ─── */
const ACTS = [
  {k:'xuat',  label:'Xuất',   color:'var(--accent)',bg:'var(--accent-soft)',ink:'var(--accent-ink)'},
  {k:'nhap',  label:'Nhập',   color:'var(--ok)',    bg:'var(--ok-soft)',    ink:'var(--ok)'},
  {k:'hu',    label:'Hư',     color:'var(--err)',   bg:'var(--err-soft)',   ink:'var(--err)'},
  {k:'km',    label:'KM',     color:'#a06b3a',      bg:'#fbf0e2',           ink:'#7a4f25'},
  {k:'chuyen',label:'Chuyển', color:'#2e6b95',      bg:'#ddeef8',           ink:'#1a4a6e'},
];

function TrongCa({data, setData, onBack, onDone, products}) {
  const upd = (idx,k,d) => {
    const ps=[...data.products]; ps[idx]={...(ps[idx]||{}),[k]:Math.max(0,((ps[idx]||{})[k]||0)+d)}; setData({...data,products:ps});
  };
  const set = (idx,k,v) => {
    const ps=[...data.products]; ps[idx]={...(ps[idx]||{}),[k]:Math.max(0,v)}; setData({...data,products:ps});
  };
  const outOfStockN = products.filter(p=>computePredicted(data.products[p.idx]||{})<=0).length;
  return (
    <div className="screen">
      <div className="app-bar" style={{background:'var(--ink)',borderBottom:0,color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:40,height:40,borderRadius:12,background:'rgba(255,255,255,.12)',color:'#fff',fontSize:22}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontSize:11,opacity:.6,letterSpacing:1.2,textTransform:'uppercase',fontWeight:600}}>Trong ca</div>
            <h1 style={{color:'#fff',fontSize:18,marginTop:2}}>Xuất · Nhập · Hư · KM · Chuyển</h1>
          </div>
          {outOfStockN>0&&(
            <div style={{background:'var(--err)',color:'#fff',borderRadius:10,padding:'5px 10px',fontSize:12,fontWeight:700,flexShrink:0,lineHeight:1.3,textAlign:'center'}}>
              ⚠ {outOfStockN} hết hàng
            </div>
          )}
        </div>
      </div>
      <div className="scroll-area" style={{padding:'10px 10px 24px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {products.map(p=>{
            const v=data.products[p.idx]||{};
            const ton=computePredicted(v);
            const oos=ton<=0;
            return (
              <div key={p.idx} className="m-card" style={{padding:'10px 10px 8px',
                border:oos?'2px solid var(--err)':'2px solid transparent',
                background:oos?'#fff5f5':'var(--paper)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  {renderIcon(p.emoji,22)}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,lineHeight:1.15}}>{p.short}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{fmt(p.gia)}</div>
                  </div>
                  {oos
                    ? <div style={{fontSize:12,fontWeight:800,padding:'5px 10px',borderRadius:8,color:'#fff',background:'var(--err)',letterSpacing:.5}}>
                        HẾT HÀNG
                      </div>
                    : <div style={{fontSize:11,fontWeight:600,padding:'4px 8px',borderRadius:8,
                        color:ton<=2?'var(--err)':ton<=5?'var(--warn)':'var(--muted)',
                        background:ton<=2?'var(--err-soft)':'var(--paper-2)'}}>
                        Còn ~<span className="t-num" style={{fontSize:13,fontWeight:800}}>{ton}</span>
                      </div>
                  }
                </div>
                {oos&&<div style={{marginBottom:8,padding:'6px 10px',background:'var(--err-soft)',borderRadius:8,fontSize:12,color:'var(--err)',fontWeight:600}}>
                  ⚠ Cần nhập hàng trước khi ghi xuất
                </div>}
                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}}>
                  {ACTS.map(a=>{
                    const cnt=v[a.k]||0; const has=cnt>0;
                    const blocked=oos&&a.k==='xuat';
                    if(a.k==='nhap'||a.k==='chuyen') return (
                      <div key={a.k} style={{
                        width:'100%',height:64,borderRadius:12,boxSizing:'border-box',
                        background:has?a.bg:'var(--paper-2)',
                        border:'1.5px solid '+(has?a.color:'transparent'),
                        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4px 6px'
                      }}>
                        <input type="number" inputMode="numeric" min="0"
                          value={cnt===0?'':cnt} placeholder="0"
                          onChange={e=>set(p.idx,a.k,Math.max(0,parseInt(e.target.value||'0',10)||0))}
                          onFocus={e=>e.target.select()} onKeyDown={noNeg}
                          style={{width:'100%',textAlign:'center',fontSize:20,fontWeight:800,
                            border:0,background:'transparent',color:has?a.ink:'var(--line-2)',
                            lineHeight:1,padding:0,outline:'none'}}/>
                        <div style={{fontSize:10,fontWeight:700,marginTop:4,textTransform:'uppercase',letterSpacing:.5,color:has?a.ink:'var(--muted)'}}>{a.label}</div>
                      </div>
                    );
                    return (
                      <div key={a.k} style={{position:'relative'}}>
                        <button onClick={()=>!blocked&&upd(p.idx,a.k,+1)} style={{
                          width:'100%',height:64,borderRadius:12,cursor:blocked?'not-allowed':'pointer',
                          background:blocked?'var(--paper-2)':has?a.bg:'var(--paper-2)',
                          border:'1.5px solid '+(blocked?'var(--line-2)':has?a.color:'transparent'),
                          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4px 2px',
                          opacity:blocked?.45:1
                        }}>
                          <div className="t-num" style={{fontSize:22,fontWeight:800,lineHeight:1,color:blocked?'var(--line-2)':has?a.ink:'var(--line-2)'}}>{cnt>0?cnt:'+'}</div>
                          <div style={{fontSize:10,fontWeight:700,marginTop:4,textTransform:'uppercase',letterSpacing:.5,color:blocked?'var(--line-2)':has?a.ink:'var(--muted)'}}>{a.label}</div>
                        </button>
                        {has&&!blocked&&<button onClick={e=>{e.stopPropagation();upd(p.idx,a.k,-1)}} style={{
                          position:'absolute',top:-4,right:-4,width:22,height:22,borderRadius:'50%',
                          background:'#fff',border:'1.5px solid '+a.color,color:a.color,
                          fontSize:16,fontWeight:700,lineHeight:1,padding:0,
                          boxShadow:'0 1px 3px rgba(0,0,0,.12)',cursor:'pointer'
                        }}>−</button>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

      </div>
      <div className="bottom-bar">
        <button className="btn-primary" onClick={onDone}>Cuối ca → Đối chiếu</button>
      </div>
    </div>
  );
}

/* ─── CUỐI CA ─── */
const CUOI_ZONES = [
  {k:'cuoi_kho', icon:'📦', label:'Kho'},
  {k:'cuoi_hop', icon:'🧁', label:'Hộp'},
];

function CuoiCa({data, setData, onBack, onDone, products}) {
  const upd = (idx, zk, rawVal) => {
    const ps   = [...data.products];
    const prev = ps[idx]||{};
    const val  = rawVal==='' ? undefined : Math.max(0,parseInt(rawVal)||0);
    const updated = {...prev, [zk]: val};
    const kho  = zk==='cuoi_kho' ? val : prev.cuoi_kho;
    const hop  = zk==='cuoi_hop' ? val : prev.cuoi_hop;
    updated.cuoi_thuc = (kho!==undefined||hop!==undefined) ? (kho||0)+(hop||0) : undefined;
    ps[idx] = updated;
    setData({...data,products:ps});
  };
  const rows = products.map(p=>{
    const v=data.products[p.idx]||{};
    const checked=v.cuoi_kho!==undefined||v.cuoi_hop!==undefined;
    const tieuThu=computeTieuThu(v);
    return {p,v,checked,tieuThu};
  });
  const doneCount = rows.filter(r=>r.checked).length;
  const allDone   = doneCount===rows.length;
  const totalRev  = products.reduce((s,p)=>s+productRev(data.products[p.idx]||{},p.gia),0);
  return (
    <div className="screen">
      <div className="app-bar" style={{background:'#1565c0',borderBottom:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:40,height:40,borderRadius:12,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:22}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontSize:11,opacity:.7,letterSpacing:1.2,textTransform:'uppercase',fontWeight:600,color:'#fff'}}>Cuối ca</div>
            <h1 style={{fontSize:18,marginTop:2,color:'#fff'}}>Đếm tồn cuối ca</h1>
          </div>
          <div style={{background:'rgba(255,255,255,.2)',color:'#fff',padding:'4px 10px',borderRadius:999,fontSize:12,fontWeight:700}}>{doneCount}/{rows.length}</div>
        </div>
      </div>
      <div className="scroll-area" style={{padding:'12px 12px 24px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {rows.map(r=>(
            <div key={r.p.idx} className="m-card" style={{padding:'10px 10px 8px',
              borderColor:r.checked?'var(--ok)':'var(--line)',borderWidth:r.checked?1.5:1}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                {renderIcon(r.p.emoji,22)}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,lineHeight:1.2}}>{r.p.short}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{fmt(r.p.gia)}</div>
                </div>
                {r.checked&&<span className="chip chip-ok">✓</span>}
              </div>
              <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,flex:1}}>
                  {CUOI_ZONES.map(z=>{
                    const cnt=r.v[z.k]; const has=cnt!==undefined;
                    return (
                      <div key={z.k} onClick={e=>e.currentTarget.querySelector('input').focus()} style={{
                        height:72,borderRadius:12,boxSizing:'border-box',
                        background:has?'var(--ok-soft)':'#fff',
                        border:'1.5px solid '+(has?'var(--ok)':'var(--line)'),
                        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                        padding:'4px 6px',cursor:'text'
                      }}>
                        <div style={{fontSize:15,lineHeight:1,marginBottom:1}}>{z.icon}</div>
                        <input type="number" inputMode="numeric" min="0"
                          value={cnt===undefined?'':cnt} placeholder="0"
                          onChange={e=>upd(r.p.idx,z.k,e.target.value)}
                          onFocus={e=>e.target.select()} onKeyDown={noNeg}
                          style={{width:'100%',textAlign:'center',fontSize:18,fontWeight:800,
                            border:0,background:'transparent',color:has?'var(--ok)':'var(--ink)',
                            lineHeight:1,padding:0,outline:'none',cursor:'text'}}/>
                        <div style={{fontSize:9,fontWeight:700,marginTop:2,textTransform:'uppercase',
                          letterSpacing:.5,color:has?'var(--ok)':'var(--muted)'}}>{z.label}</div>
                      </div>
                    );
                  })}
                </div>
                {r.checked&&r.tieuThu!==null&&(
                  <div style={{flexShrink:0,textAlign:'right',paddingBottom:2}}>
                    <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,marginBottom:2}}>Đã bán</div>
                    <div className="t-num" style={{fontSize:13,fontWeight:700,color:'var(--ink)'}}>{r.tieuThu} cái</div>
                    <div className="t-money" style={{fontSize:15,fontWeight:800,color:'var(--ok)'}}>{fmt(r.tieuThu*r.p.gia)}</div>
                  </div>
                )}
              </div>
              {r.checked&&(
                <div style={{marginTop:6,fontSize:11,color:'var(--muted)',fontWeight:600,textAlign:'right'}}>
                  Tổng tồn: <span style={{color:'var(--ok)',fontWeight:800}}>{r.v.cuoi_thuc}</span> cái
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <div className="bottom-bar">
        {doneCount>0&&(
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,padding:'0 4px'}}>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,fontWeight:700}}>Doanh thu</div>
            <div className="t-money" style={{fontSize:16,fontWeight:800}}>{fmt(totalRev)}</div>
          </div>
        )}
        <button className={`btn-primary ${allDone?'is-ok':''}`} onClick={onDone}>
          {allDone?'✓ Xong — sang đếm tiền':'Tiếp tục →'}
        </button>
      </div>
    </div>
  );
}

/* ─── TIỀN ─── */
function Tien({mode, data, setData, onBack, onDone, products}) {
  const key    = mode==='dau'?'tien_dau':'tien_cuoi';
  const counts = data[key]||{};
  const updD   = (d,delta) => setData({...data,[key]:{...counts,[d]:Math.max(0,(counts[d]||0)+delta)}});
  const setVal = (d,val)   => setData({...data,[key]:{...counts,[d]:Math.max(0,val)}});
  const total    = DENOMS.reduce((s,d)=>s+(counts[d]||0)*d,0);
  const totalRev = products.reduce((s,p)=>s+productRev(data.products[p.idx]||{},p.gia),0);
  const dauTotal = DENOMS.reduce((s,d)=>s+(data.tien_dau?.[d]||0)*d,0);
  const chiPhi   = (data.chi_phi_items||[]).reduce((s,i)=>s+(i.amount||0),0);
  const dtNH     = data.dt_nh||0;
  const expected = dauTotal+(totalRev-dtNH)-chiPhi;
  const diff     = total-expected;
  const isCuoi   = mode==='cuoi';
  return (
    <div className="screen">
      <div className="app-bar" style={{background:isCuoi?'#00695c':'var(--accent)',borderBottom:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:40,height:40,borderRadius:12,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:22}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontSize:11,opacity:.7,letterSpacing:1.2,textTransform:'uppercase',fontWeight:600,color:'#fff'}}>{isCuoi?'Cuối ca':'Đầu ca'}</div>
            <h1 style={{fontSize:18,marginTop:2,color:'#fff'}}>{isCuoi?'Đếm tiền cuối ca':'Đếm tiền đầu ca'}</h1>
          </div>
        </div>
      </div>
      <div className="scroll-area" style={{padding:'10px 12px 24px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {DENOMS.map(d=>{
            const n=counts[d]||0; const has=n>0;
            return (
              <div key={d} className="m-card" style={{padding:10,display:'flex',alignItems:'center',gap:10,borderColor:has?'var(--accent)':'var(--line)',borderWidth:has?1.5:1}}>
                <div style={{width:78,height:44,borderRadius:8,background:denomBg(d),display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13,flexShrink:0,textShadow:'0 1px 1px rgba(0,0,0,.25)'}} className="t-num">{denomLabel(d)}</div>
                <div style={{flex:1}}><div className="t-money" style={{fontSize:13,color:'var(--muted)',fontWeight:600}}>{has?fmt(n*d):'—'}</div></div>
                <button onClick={()=>updD(d,-1)} disabled={n===0} style={{width:38,height:38,borderRadius:10,background:'var(--paper-2)',fontSize:22,color:n===0?'var(--line-2)':'var(--ink-2)'}}>−</button>
                <input type="number" inputMode="numeric" value={n===0?'':n} placeholder="0"
                  onChange={e=>setVal(d,parseInt(e.target.value||'0',10)||0)}
                  onFocus={e=>e.target.select()}
                  className="t-num" style={{width:52,height:38,borderRadius:10,border:'1px solid var(--line)',background:'#fff',textAlign:'center',fontSize:17,fontWeight:700}}/>
                <button onClick={()=>updD(d,+1)} style={{width:44,height:38,borderRadius:10,background:'var(--accent)',color:'#fff',fontSize:22,fontWeight:600,lineHeight:1}}>+</button>
              </div>
            );
          })}
        </div>
        <div className="m-card" style={{marginTop:12,padding:14,
          background:isCuoi?'var(--paper-2)':'var(--accent-soft)',
          borderColor:isCuoi?'var(--line)':'var(--accent)',borderWidth:1.5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--ink-2)'}}>∑ Tổng tiền đếm được</span>
            <span className="t-money" style={{fontSize:22,fontWeight:800,color:'var(--ink)'}}>{fmt(total)}</span>
          </div>
        </div>
        {isCuoi&&(
          <div className="m-card" style={{padding:14,marginTop:12}}>
            <div>
              <label style={{fontSize:12,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:4}}>💳 Doanh thu chuyển khoản / Momo / NH</label>
              <input type="text" inputMode="numeric" placeholder="0"
                value={dtNH===0?'':Math.round(dtNH).toLocaleString('vi-VN')}
                onChange={e=>{ const v=parseInt(e.target.value.replace(/\D/g,'')||'0',10)||0; setData({...data,dt_nh:v}); }}
                onFocus={e=>e.target.select()} className="field-input t-num" style={{height:48,fontSize:17,fontWeight:700,textAlign:'right'}}/>
            </div>
          </div>
        )}
      </div>
      <div className="bottom-bar">
        <button className={`btn-primary ${isCuoi?'is-ok':''}`} onClick={onDone} disabled={total===0}>
          {!isCuoi?'✓ Tiền đầu ca xong':'✓ Xong — sang bàn giao'}
        </button>
      </div>
    </div>
  );
}

/* ─── GIAO CA ─── */
function GiaoCa({data, setData, onBack, onSubmit, submitting, products}) {
  const upd       = (k,v) => setData({...data,[k]:v});
  const catDt     = data.cat_dt||{};
  const updCat    = (d,delta) => setData({...data,cat_dt:{...catDt,[d]:Math.max(0,(catDt[d]||0)+delta)}});
  const setCat    = (d,val)   => setData({...data,cat_dt:{...catDt,[d]:Math.max(0,val)}});
  const totalCuoi = DENOMS.reduce((s,d)=>s+(data.tien_cuoi?.[d]||0)*d,0);
  const totalDau  = DENOMS.reduce((s,d)=>s+(data.tien_dau?.[d]||0)*d,0);
  const totalRev  = products.reduce((s,p)=>s+productRev(data.products[p.idx]||{},p.gia),0);
  const chiPhiSum = (data.chi_phi_items||[]).reduce((s,i)=>s+(i.amount||0),0);
  const expected  = totalDau+(totalRev-(data.dt_nh||0))-chiPhiSum;
  const tienDiff  = totalCuoi-expected;
  const totalCat  = DENOMS.reduce((s,d)=>s+(catDt[d]||0)*d,0);
  const dtTienMat = totalCuoi - totalDau;
  const catDiff   = totalCat - dtTienMat;
  const rem       = DENOMS.map(d=>({d,n:(data.tien_cuoi?.[d]||0)-(catDt[d]||0)}));
  const totalRem  = rem.reduce((s,r)=>s+r.n*r.d,0);
  const hasNeg    = rem.some(r=>r.n<0);
  const remRows   = rem.filter(r=>(data.tien_cuoi?.[r.d]||0)>0||(catDt[r.d]||0)>0);
  const canSubmit = !submitting&&!hasNeg;
  const suggestCat = () => {
    const result = {}; let remaining = dtTienMat;
    for (const d of DENOMS) {
      const avail = data.tien_cuoi?.[d]||0;
      const take  = Math.min(avail, Math.floor(remaining/d));
      if (take>0) result[d]=take;
      remaining -= take*d;
    }
    setData({...data, cat_dt:result});
  };
  return (
    <div className="screen">
      <div className="app-bar">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{width:40,height:40,borderRadius:12,background:'var(--paper-2)',fontSize:22}}>‹</button>
          <div style={{flex:1}}>
            <div className="h-section">Cuối ca</div>
            <h1 style={{fontSize:18,marginTop:2}}>Bàn giao ca</h1>
          </div>
        </div>
      </div>
      <div className="scroll-area" style={{padding:'14px 14px 24px'}}>

        <div className="m-card" style={{padding:14,marginBottom:12}}>
          <div className="h-section" style={{marginBottom:10}}>Tóm tắt ca {data.ten||'—'} · {data.vi_tri||'—'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:13}}>
            {[['Doanh thu cần có',fmt(totalRev)],['Doanh thu tiền mặt',fmt(totalCuoi-totalDau)],['Chuyển khoản / NH',fmt(data.dt_nh||0)],['Chi phí',fmt(chiPhiSum)],['Tiền đầu ca',fmt(totalDau)],['Tiền cuối ca',fmt(totalCuoi)]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                <span style={{color:'var(--muted)',fontSize:12}}>{l}</span>
                <span className="t-money" style={{fontWeight:600}}>{v}</span>
              </div>
            ))}
            <div style={{padding:'8px 10px',borderRadius:8,marginTop:4,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13,
              background:tienDiff===0?'var(--ok-soft)':'var(--err-soft)'}}>
              <span style={{color:tienDiff===0?'var(--ok)':'var(--err)'}}>{tienDiff===0?'✓ Tiền khớp':tienDiff>0?'⚠ Thừa':'⚠ Thiếu'}</span>
              <span className="t-money" style={{color:tienDiff===0?'var(--ok)':'var(--err)'}}>{tienDiff===0?'0 ₫':(tienDiff>0?'+':'')+fmt(tienDiff)}</span>
            </div>
          </div>
        </div>

        <div className="m-card" style={{padding:14,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div>
              <div className="h-section" style={{marginBottom:2}}>💰 Cất tiền mặt</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>Cần cất: <span style={{fontWeight:700,color:'var(--ink)'}}>{fmt(dtTienMat)}</span></div>
            </div>
            {dtTienMat>0&&(
              <button onClick={suggestCat}
                style={{padding:'6px 12px',borderRadius:10,background:'var(--accent-soft)',
                  color:'var(--accent-ink)',fontSize:12,fontWeight:700,
                  border:'1.5px solid var(--accent)',cursor:'pointer',flexShrink:0}}>
                ✨ Gợi ý
              </button>
            )}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {DENOMS.map(d=>{
              const n=catDt[d]||0; const has=n>0;
              const avail=data.tien_cuoi?.[d]||0;
              const over=n>avail&&avail>0;
              return (
                <div key={d} className="m-card" style={{padding:10,display:'flex',alignItems:'center',gap:10,
                  borderColor:over?'var(--err)':has?'var(--accent)':'var(--line)',borderWidth:(over||has)?1.5:1}}>
                  <div style={{width:72,height:40,borderRadius:8,background:denomBg(d),display:'flex',alignItems:'center',
                    justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13,flexShrink:0,
                    textShadow:'0 1px 1px rgba(0,0,0,.25)'}} className="t-num">{denomLabel(d)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="t-money" style={{fontSize:12,color:over?'var(--err)':has?'var(--ink-2)':'var(--muted)',fontWeight:has?600:400}}>
                      {has?fmt(n*d):'—'}
                    </div>
                    {avail>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>có {avail} tờ</div>}
                  </div>
                  <button onClick={()=>updCat(d,-1)} disabled={n===0}
                    style={{width:38,height:38,borderRadius:10,background:'var(--paper-2)',fontSize:22,
                      color:n===0?'var(--line-2)':'var(--ink-2)',border:0}}>−</button>
                  <input type="number" inputMode="numeric" value={n===0?'':n} placeholder="0"
                    onChange={e=>setCat(d,parseInt(e.target.value||'0',10)||0)}
                    onFocus={e=>e.target.select()} className="t-num"
                    style={{width:52,height:38,borderRadius:10,border:'1px solid var(--line)',
                      background:'#fff',textAlign:'center',fontSize:17,fontWeight:700}}/>
                  <button onClick={()=>updCat(d,+1)}
                    style={{width:44,height:38,borderRadius:10,background:'var(--accent)',
                      color:'#fff',fontSize:22,fontWeight:600,lineHeight:1,border:0}}>+</button>
                </div>
              );
            })}
          </div>
          {dtTienMat>0&&(
            <div style={{marginTop:10,padding:'10px 12px',borderRadius:10,
              background:catDiff===0?'var(--ok-soft)':catDiff>0?'#fff3cd':'var(--err-soft)',
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,
                  color:catDiff===0?'var(--ok)':catDiff>0?'#856404':'var(--err)'}}>
                  {catDiff===0?'✓ Đã cất đủ':catDiff>0?'⚠ Cất thừa':'⚠ Còn thiếu'}
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Đã cất: {fmt(totalCat)}</div>
              </div>
              <span className="t-money" style={{fontSize:18,fontWeight:800,
                color:catDiff===0?'var(--ok)':catDiff>0?'#856404':'var(--err)'}}>
                {catDiff===0?'—':(catDiff>0?'+':'')+fmt(catDiff)}
              </span>
            </div>
          )}
        </div>

        <div className="m-card" style={{padding:14,marginBottom:12,
          background:hasNeg?'var(--err-soft)':'var(--ok-soft)',
          borderColor:hasNeg?'var(--err)':'var(--ok)',borderWidth:1.5}}>
          <div className="h-section" style={{marginBottom:10,color:hasNeg?'var(--err)':'var(--ok)'}}>
            🏦 Còn lại cho ca sau
          </div>
          {remRows.length===0?(
            <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'8px 0'}}>Chưa có dữ liệu tiền cuối ca</div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {remRows.map(r=>(
                <div key={r.d} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 8px',borderRadius:8,
                  background:r.n<0?'rgba(197,34,31,.08)':'rgba(255,255,255,.5)'}}>
                  <div style={{width:60,height:32,borderRadius:6,background:denomBg(r.d),display:'flex',
                    alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:11,
                    flexShrink:0,opacity:r.n===0?.45:1}} className="t-num">{denomLabel(r.d)}</div>
                  <div style={{flex:1}}>
                    <span className="t-num" style={{fontSize:16,fontWeight:800,
                      color:r.n<0?'var(--err)':r.n===0?'var(--muted)':'var(--ink)'}}>{r.n}</span>
                    <span style={{color:'var(--muted)',fontSize:11,marginLeft:3}}>tờ</span>
                  </div>
                  <span className="t-money" style={{fontSize:13,fontWeight:700,
                    color:r.n<0?'var(--err)':r.n===0?'var(--muted)':'var(--ok)'}}>{r.n===0?'—':fmt(r.n*r.d)}</span>
                </div>
              ))}
            </div>

/* ─── HUB ─── */
function Hub({data, setData, setScreen, prevData, products, authUser, onLogout}) {
  const [editing, setEditing] = useState(!data.vi_tri);
  const tienDauTotal = DENOMS.reduce((s,d)=>s+(data.tien_dau?.[d]||0)*d,0);
  const tienCuoiTotal= DENOMS.reduce((s,d)=>s+(data.tien_cuoi?.[d]||0)*d,0);
  const hangDone    = data.dau_ca_done;
  const dauLechCount = hangDone && prevData && products.length
    ? products.filter(p => {
        const v  = data.products[p.idx]||{};
        const pt = prevData[p.locIdx]?.cuoi_thuc;
        if (pt === undefined || pt === '') return false;
        return (v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0) !== Number(pt);
      }).length
    : 0;
  const tienDauDone  = tienDauTotal>0;
  const tienCuoiDone = tienCuoiTotal>0;
  const trongActive  = products.some(p=>{ const v=data.products[p.idx]||{}; return (v.xuat||0)+(v.nhap||0)+(v.hu||0)+(v.km||0)+(v.chuyen||0)>0; });
  const chiPhiItems  = data.chi_phi_items||[];
  const chiPhiTotal  = chiPhiItems.reduce((s,i)=>s+(i.amount||0),0);
  const cuoiDone    = products.length>0 && products.every(p=>{ const v=data.products[p.idx]||{}; return v.cuoi_thuc!==undefined&&v.cuoi_thuc!==''; });
  const totalRev    = products.reduce((s,p)=>s+productRev(data.products[p.idx]||{},p.gia),0);
  const filledCount = products.filter(p=>{ const v=data.products[p.idx]||{}; return (v.dau_h1||0)+(v.dau_h2||0)+(v.dau_kho||0)+(v.dau_cu||0)>0; }).length;
  const cuoiCount   = products.filter(p=>{ const v=data.products[p.idx]||{}; return v.cuoi_thuc!==undefined&&v.cuoi_thuc!==''; }).length;
  const nP          = products.length;

  const resetStep = key => {

      next = {...data, products:ps, dau_ca_done:false};
    } else if (key === 'tien-dau') {
      next = {...data, tien_dau:{}};
    } else if (key === 'trong') {
      const ps = data.products.map(v=>{ const {xuat,nhap,hu,km,chuyen,...r}=v; return r; });

/* ─── APP ─── */
function App() {
  const readAuth = () => {
    try {
      const stored = JSON.parse(localStorage.getItem(AUTH_KEY));
      if (!stored) return null;
      if (stored.expiresAt && Date.now() > stored.expiresAt) {
        localStorage.removeItem(AUTH_KEY);
        return null;
      }
      return stored;
    } catch { return null; }
  };

  const [authUser, setAuthUser] = useState(readAuth);

  // Kiểm tra hết hạn mỗi phút khi đang dùng
  useEffect(() => {
    if (!authUser) return;
    const t = setInterval(() => {
      if (!readAuth()) {
        if (window.google) google.accounts.id.disableAutoSelect();
        setAuthUser(null);
      }
    }, 60 * 1000);
    return () => clearInterval(t);
  }, [authUser]);

  const handleAuthSuccess = async credentialResponse => {
    try {
      const token = credentialResponse.credential;
      const [tokenRes, usersRes] = await Promise.all([
        fetch('https://oauth2.googleapis.com/tokeninfo?id_token=' + token),
        fetch(GAS_URL + '?action=getUsers'),
      ]);
      const info      = await tokenRes.json();
      const usersData = await usersRes.json();
      const whitelist = (usersData.emails || []).map(e => e.toLowerCase());
      if (!info.email || !whitelist.includes(info.email.toLowerCase())) {
        alert('Tài khoản ' + (info.email||'') + ' không có quyền truy cập.');
        return;
      }
      const user = { email: info.email, name: info.name, picture: info.picture, expiresAt: Date.now() + SESSION_MS };
      localStorage.setItem(AUTH_KEY, JSON.stringify(user));
      setAuthUser(user);
    } catch(e) {
      alert('Đăng nhập thất bại: ' + e.message);
    }
  };

  const handleLogout = () => {
    if (window.google) google.accounts.id.disableAutoSelect();
    localStorage.removeItem(AUTH_KEY);
    setAuthUser(null);
  };

  if (!authUser) return <Login onSuccess={handleAuthSuccess} />;
  return <AppContent authUser={authUser} onLogout={handleLogout} />;
}

function AppContent({ authUser, onLogout }) {
  const [data, setDataRaw] = useState(()=>{
    try { const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):INIT(); } catch { return INIT(); }
  });
  const [screen,      setScreen]    = useState('hub');
  const [toast,       setToast]     = useState(null);
  const [submitting,  setSubmitting]= useState(false);
  const [hasUpdate,   setHasUpdate] = useState(false);
  const [newVersion,  setNewVersion] = useState('');
  const [prevData,    setPrevData]  = useState(null);
  const [prevLoading, setPrevLoading] = useState(false);
  const [allProducts, setAllProducts]= useState(null);

  useEffect(()=>{
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('/quanlycuahang/sw.js').then(reg=>{
      const onWaiting = () => {
        if (!navigator.serviceWorker.controller) return;
        fetch('/quanlycuahang/sw.js?_=' + Date.now())
          .then(r => r.text())
          .then(txt => {
            const m = txt.match(/const CACHE = 'kiem-ke-ca-(v\d+)'/);
            if (m) setNewVersion(m[1]);
          }).catch(()=>{});
        setHasUpdate(true);
      };
      // SW đã ở trạng thái waiting ngay khi load (ví dụ sau khi tab nền tải xong)
      if (reg.waiting) { onWaiting(); }
      // SW mới vừa tìm thấy
      reg.addEventListener('updatefound', ()=>{
        const sw = reg.installing;
        sw.addEventListener('statechange', ()=>{
          if (sw.state==='installed') onWaiting();
        });
      });
      // Kiểm tra cập nhật mỗi khi mở lại app
      document.addEventListener('visibilitychange', ()=>{
        if (document.visibilityState==='visible') reg.update();
      });
    });
    // Sau khi SW mới kích hoạt (do SKIP_WAITING) → reload để lấy bản mới
    navigator.serviceWorker.addEventListener('controllerchange', ()=>window.location.reload());
  }, []);

  // Sync tên từ Google account vào data.ten
  useEffect(()=>{
    if (authUser?.name && data.ten !== authUser.name) {
      setData({...data, ten: authUser.name});
    }
  }, [authUser]);

  // Fetch all products from san_pham sheet once on mount
  useEffect(()=>{
    fetchAllProducts()
      .then(ps=>{
        if (!ps) return;
        setAllProducts(ps);
        setDataRaw(d=>{
          if (d.products.length===ps.length) return d;
          const saved = d.products;
          const migrated = ps.map((_,i)=>saved[i]||{});
          const next = {...d, products:migrated};
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
          return next;
        });
      })
      .catch(()=>{});
  }, []);

  // Fetch previous shift when location is ready
  useEffect(()=>{
    if (!data.vi_tri) return;
    setPrevLoading(true);
    setPrevData(null);
    fetchLastShift(data.vi_tri)
      .then(res=>{ if (res.success && res.products) setPrevData(res.products); })
      .catch(()=>{})
      .finally(()=>setPrevLoading(false));
  }, [data.vi_tri]);

  // Products visible at current location — idx = allProducts position, locIdx = position in filtered list
  const locationProducts = allProducts
    ? allProducts.map((p,i)=>({...p,idx:i})).filter(p=>
        data.vi_tri==='Bình Tân' ? p.binh_tan : data.vi_tri==='Quận 6' ? p.quan_6 : false)
      .map((p,locIdx)=>({...p,locIdx}))
    : [];

  const setData = d => {
    setDataRaw(d);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
  };
  const showToast = (msg,type='ok') => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };
  const nav = s => setScreen(s);

  const handleSubmit = async () => {
    setSubmitting(true);
    try {
      const chiPhiTotal = (data.chi_phi_items||[]).reduce((s,i)=>s+(i.amount||0),0);
      const payload = {...data, chi_phi: chiPhiTotal};
      const res  = await fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'GAS error');
      showToast('✓ Đã gửi báo cáo ca!', 'ok');
      setTimeout(()=>{ localStorage.removeItem(STORAGE_KEY); setDataRaw(INIT()); setScreen('hub'); }, 2000);
    } catch(e) {
      showToast('❌ Lỗi: ' + e.message, 'err');
    } finally { setSubmitting(false); }
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {hasUpdate&&(
        <div style={{flexShrink:0,background:'var(--ok)',color:'#fff',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,zIndex:300}}>
          <span style={{fontSize:14,fontWeight:600}}>🔄 Có bản cập nhật mới{newVersion?` — ${newVersion}`:''}</span>
          <button onClick={()=>{
            navigator.serviceWorker.ready.then(reg=>{
              if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
              else window.location.reload();
            });
          }} style={{background:'#fff',color:'var(--ok)',padding:'6px 16px',borderRadius:8,fontSize:13,fontWeight:700,border:0,cursor:'pointer',flexShrink:0}}>
            Tải lại
          </button>
        </div>
      )}
      {screen==='hub'       &&<Hub      data={data} setData={setData} setScreen={nav} prevData={prevData} products={locationProducts} authUser={authUser} onLogout={onLogout}/>}
      {screen==='dau'       &&<DauCa    data={data} setData={setData} onBack={()=>nav('hub')}       onDone={()=>{ setData({...data, dau_ca_done:true}); nav('hub'); }} prevData={prevData} prevLoading={prevLoading} products={locationProducts}/>}
      {screen==='trong'     &&<TrongCa  data={data} setData={setData} onBack={()=>nav('hub')}       onDone={()=>nav('hub')} products={locationProducts}/>}
      {screen==='cuoi'      &&<CuoiCa   data={data} setData={setData} onBack={()=>nav('hub')}       onDone={()=>nav('hub')} products={locationProducts}/>}
      {screen==='tien-dau'  &&<Tien mode="dau"  data={data} setData={setData} onBack={()=>nav('hub')}      onDone={()=>nav('hub')} products={locationProducts}/>}
      {screen==='tien-cuoi' &&<Tien mode="cuoi" data={data} setData={setData} onBack={()=>nav('hub')}       onDone={()=>nav('giao')} products={locationProducts}/>}
      {screen==='chi-phi'   &&<ChiPhi   data={data} setData={setData} onBack={()=>nav('hub')} onDone={()=>nav('hub')}/>}
      {screen==='giao'      &&<GiaoCa   data={data} setData={setData} onBack={()=>nav('tien-cuoi')} onSubmit={handleSubmit} submitting={submitting} products={locationProducts}/>}
      {toast&&<div className={`toast ${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
